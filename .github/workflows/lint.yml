name: lintbot
run-name: Linting for PR
on:

  workflow_run:
    workflows: [push-build-release]
    types:
      - completed
jobs:
  qmllint-comment:
    uses: EddyTheCo/Common/.github/workflows/lint.yml@v0.7.0
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
      pull-requests: write
