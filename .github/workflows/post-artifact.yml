name: postartifactbot
run-name: Post build artifacts for PR
on:

  workflow_run:
    workflows: [push-build-release]
    types:
      - completed
jobs:
  post-artifact-comment:
    uses: EddyTheCo/Common/.github/workflows/artifact-post.yml@develop
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
      pull-requests: write
